name: Validate JSON Files

on:
  push:
    branches: [ '2025/v1' ]
    paths:
      - '**.json'
      - 'Sources/**'
      - 'Tests/**'
      - 'Package.swift'
      - '.github/workflows/validate-json.yml'
  pull_request:
    branches: [ '2025/v1' ]
    paths:
      - '**.json'
      - 'Sources/**'
      - 'Tests/**'
      - 'Package.swift'
      - '.github/workflows/validate-json.yml'
  workflow_dispatch:

jobs:
  validate-json-swift:
    name: Swift Tests on macOS
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.1"
      
      - name: Build
        run: swift build --verbose
      
      - name: Run Swift tests
        run: swift test --verbose
      
      - name: Build release
        run: swift build -c release
        
  validate-json-ubuntu:
    name: Swift Tests on Ubuntu
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.1"
      
      - name: Build
        run: swift build --verbose
        
      - name: Run Swift tests
        run: swift test --verbose
      
      - name: Validate with jq as additional check
        run: |
          echo "Validating JSON files with jq..."
          
          # Array of JSON files to validate
          json_files=(
            "schedule.json"
            "sponsors.json"
            "staffs.json"
            "speakers.json"
          )
          
          # Flag to track if any validation fails
          has_error=0
          
          # Validate each JSON file
          for file in "${json_files[@]}"; do
            echo "Checking $file..."
            if [ -f "$file" ]; then
              if jq empty "$file" 2>/dev/null; then
                echo "✅ $file is valid JSON"
              else
                echo "❌ $file is invalid JSON"
                jq . "$file" 2>&1 || true
                has_error=1
              fi
            else
              echo "⚠️  $file not found"
            fi
            echo ""
          done
          
          # Exit with error if any validation failed
          if [ $has_error -eq 1 ]; then
            echo "❌ JSON validation failed"
            exit 1
          else
            echo "✅ All JSON files are valid"
          fi
  
  summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs: [validate-json-swift, validate-json-ubuntu]
    if: always()
    
    steps:
      - name: Summary
        run: |
          echo "## JSON Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.validate-json-swift.result }}" == "success" ] && [ "${{ needs.validate-json-ubuntu.result }}" == "success" ]; then
            echo "✅ All JSON files are valid and can be decoded by Swift Codable" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ macOS Swift tests passed" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Ubuntu Swift tests passed" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ JSON syntax validation passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ JSON validation failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            [ "${{ needs.validate-json-swift.result }}" != "success" ] && echo "- ❌ macOS Swift tests failed" >> $GITHUB_STEP_SUMMARY
            [ "${{ needs.validate-json-ubuntu.result }}" != "success" ] && echo "- ❌ Ubuntu Swift tests failed" >> $GITHUB_STEP_SUMMARY
          fi